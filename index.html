<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Anomalías REINFO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #0f0f0f; color: white; }
        #map { flex: 1; height: 100%; }
        #panel { width: 350px; background: #181818; padding: 20px; box-sizing: border-box; overflow-y: auto; border-right: 1px solid #333; }
        h2 { color: #00d2ff; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .filter-group { margin-bottom: 15px; }
        select { width: 100%; padding: 10px; background: #252525; color: white; border: 1px solid #444; border-radius: 5px; }
        .legend { background: #222; padding: 10px; border-radius: 8px; margin-top: 20px; font-size: 0.8rem; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .color-box { width: 15px; height: 15px; margin-right: 10px; border-radius: 3px; }
        #loading { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; z-index: 2000; display: none; border: 1px solid #00d2ff; }
    </style>
</head>
<body>
    <div id="panel">
        <h2>Dashboard SEM & ENAHO</h2>
        <!-- Filtros existentes -->
        <div class="filter-group">
            <label>Departamento</label>
            <select id="select-departamento">
                <option value="todos">-- Todos --</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Distrito</label>
            <select id="select-distrito">
                <option value="todos">-- Todos --</option>
            </select>
        </div>

        <div class="legend">
            <strong>Capas:</strong>
            <div class="legend-item"><div class="color-box" style="background: #d73027;"></div> Residuos SEM (Puntos)</div>
            <div class="legend-item"><div class="color-box" style="background: #ff7800; opacity: 0.5; border: 1px solid white;"></div> Dependencia ENAHO (Áreas)</div>
        </div>
        <canvas id="chartPie" style="margin-top: 30px;"></canvas>
    </div>

    <div id="loading">Cargando capas geográficas...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-9.19, -75.01], 6);
        
        // Capa Base
        const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: '© Google'
        }).addTo(map);

        // GRUPOS DE CAPAS
        let puntosOriginales = [];
        let capaResiduos = L.layerGroup().addTo(map);
        let capaEnaho = L.geoJSON(null, {
            style: { color: "#ff7800", weight: 1.5, fillOpacity: 0.2 },
            onEachFeature: function(feature, layer) {
                layer.bindPopup("<b>Área ENAHO 2024</b><br>Distrito: " + (feature.properties.distrito || "N/A"));
            }
        });

        // CONTROL DE CAPAS (Arriba a la derecha)
        const overlays = {
            "Residuos SEM (Puntos)": capaResiduos,
            "Dependencia ENAHO (Áreas)": capaEnaho
        };
        L.control.layers(null, overlays, { collapsed: false }).addTo(map);

        let myChart;

        function getColor(res) {
            return res < -1.5 ? '#d73027' : res < -0.5 ? '#fc8d59' : res < 0.5 ? '#f7f7f7' : res < 1.5 ? '#91bfdb' : '#4575b4';
        }

        // CARGA DE DATOS 1: RESIDUOS
        async function cargarDatos() {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch('https://reinfo-api-1.onrender.com/puntos-reinfo');
                puntosOriginales = await response.json();
                rellenarFiltros();
                actualizarMapa(puntosOriginales);
                actualizarGrafico(puntosOriginales);
            } catch (e) { console.error(e); }
            document.getElementById('loading').style.display = 'none';
        }

        // CARGA DE DATOS 2: ENAHO
        async function cargarEnaho() {
            try {
                const response = await fetch('https://reinfo-api-1.onrender.com/capa-enaho');
                const data = await response.json();
                capaEnaho.addData(data);
            } catch (e) { console.error("Error ENAHO:", e); }
        }

        function actualizarMapa(data) {
            capaResiduos.clearLayers();
            data.forEach(p => {
                if (p.lat && p.lon) {
                    const marker = L.circleMarker([p.lat, p.lon], {
                        radius: 6, fillColor: getColor(p.residuos), color: "#000", weight: 1, fillOpacity: 0.9
                    });
                    marker.bindPopup(`<b>${p.DISTRITO}</b><br>Residuo: ${p.residuos.toFixed(4)}`);
                    capaResiduos.addLayer(marker);
                }
            });
        }

        // ... (Mantén tus funciones de rellenarFiltros, actualizarGrafico y Eventos de Filtro igual que antes) ...

        // INICIO
        cargarDatos();
        cargarEnaho();
    </script>
</body>
</html>
