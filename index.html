<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa REINFO - Google Hybrid</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .info-panel {
            position: absolute;
            top: 20px;
            left: 60px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #ccc;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 5px;
            padding: 5px;
        }

        .popup-table {
            font-size: 12px;
            border-collapse: collapse;
            width: 100%;
        }

        .popup-table td {
            padding: 4px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3 style="margin:0 0 5px 0; color: #333;">Visor REINFO</h3>
        <div id="status">📡 Conectando a servidor...</div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inicializar el mapa
        const map = L.map('map').setView([-9.19, -75.01], 6);

        // 2. Definir Capas Base
        // Google Hybrid (lyrs=y: satélite + etiquetas)
        const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3'],
            attribution: '© Google Maps'
        }).addTo(map);

        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        });

        // Control de capas
        const baseMaps = {
            "Google Satélite Híbrido": googleHybrid,
            "OpenStreetMap": osm
        };
        L.control.layers(baseMaps).addTo(map);

        // 3. Función para cargar datos desde el Backend
        async function cargarDatos() {
            const statusDiv = document.getElementById('status');
            
            try {
                // Asegúrate de agregar el /puntos-reinfo al final
                const response = await fetch('https://reinfo-api-1.onrender.com/puntos-reinfo');
                if (!response.ok) throw new Error("Error en la respuesta de la API");
                
                const data = await response.json();

                L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 7,
                            fillColor: "#00f2ff", // Cian brillante para resaltar sobre satélite
                            color: "#ffffff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties) {
                            let table = "<table class='popup-table'>";
                            for (let key in feature.properties) {
                                // Evitamos mostrar columnas basura
                                if (key !== 'geometry' && key !== '.geo') {
                                    table += `<tr><td><b>${key}:</b></td><td>${feature.properties[key]}</td></tr>`;
                                }
                            }
                            table += "</table>";
                            layer.bindPopup(`<b>Detalles del Punto</b><br>${table}`, { maxWidth: 300 });
                        }
                    }
                }).addTo(map);

                statusDiv.innerHTML = "✅ Capas cargadas desde PostGIS";
                statusDiv.style.color = "green";

            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = "❌ Error de conexión con el Backend";
                statusDiv.style.color = "red";
            }
        }

        cargarDatos();
    </script>
</body>
</html>
