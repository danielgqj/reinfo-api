<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard REINFO - Geoportal</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #map { flex: 1; height: 100%; }
        #panel { width: 320px; background: #1a1a1a; color: white; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; shadow: 2px 0 5px rgba(0,0,0,0.5); z-index: 1000; }
        
        h2 { font-size: 1.2rem; margin-top: 0; color: #00d2ff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .filter-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #ccc; }
        
        select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; cursor: pointer; }
        select:focus { outline: none; border-color: #00d2ff; }

        .stats-container { margin-top: auto; background: #222; padding: 15px; border-radius: 10px; }
        #chart-wrapper { height: 200px; margin-top: 10px; }
        
        .loading-overlay { position: fixed; top: 10px; left: 330px; background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; z-index: 2000; display: none; }
    </style>
</head>
<body>

    <div id="panel">
        <h2>Filtros de Búsqueda</h2>
        
        <div class="filter-group">
            <label>DEPARTAMENTO</label>
            <select id="select-departamento">
                <option value="todos">-- Todos --</option>
            </select>
        </div>

        <div class="filter-group">
            <label>DISTRITO</label>
            <select id="select-distrito">
                <option value="todos">-- Todos --</option>
            </select>
        </div>

        <div class="stats-container">
            <h3 style="font-size: 1rem; margin: 0;">Distribución Regional</h3>
            <div id="chart-wrapper">
                <canvas id="chartPie"></canvas>
            </div>
        </div>
    </div>

    <div id="loading" class="loading-overlay">Conectando a la base de datos...</div>
    <div id="map"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // 1. Inicializar Mapa con Google Hybrid
        const map = L.map('map').setView([-9.19, -75.01], 6);
        
        L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3'],
            attribution: '© Google Maps'
        }).addTo(map);

        let puntosOriginales = [];
        let markersLayer = L.layerGroup().addTo(map);
        let myChart;

        // 2. Función para cargar datos de Render
        async function cargarDatos() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            try {
                const response = await fetch('https://reinfo-api-1.onrender.com/puntos-reinfo');
                puntosOriginales = await response.json();
                
                rellenarDepartamentos();
                actualizarMapa(puntosOriginales);
                actualizarGrafico(puntosOriginales);
                
                loading.style.display = 'none';
            } catch (error) {
                console.error("Error cargando API:", error);
                loading.textContent = "Error al conectar con Render.";
            }
        }

        // 3. Llenar Select de Departamentos (Columna: DEPARTAMEN)
        function rellenarDepartamentos() {
            const selectDep = document.getElementById('select-departamento');
            const deps = [...new Set(puntosOriginales.map(p => p.DEPARTAMEN))].sort();
            
            deps.forEach(dep => {
                if(dep) {
                    const opt = document.createElement('option');
                    opt.value = dep;
                    opt.textContent = dep;
                    selectDep.appendChild(opt);
                }
            });
        }

        // 4. Actualizar el Mapa
        function actualizarMapa(data) {
            markersLayer.clearLayers();
            
            data.forEach(p => {
                if (p.lat && p.lon) {
                    const marker = L.circleMarker([p.lat, p.lon], {
                        radius: 5,
                        fillColor: "#00f2ff",
                        color: "#fff",
                        weight: 1,
                        fillOpacity: 0.7
                    });
                    
                    marker.bindPopup(`
                        <div style="color:#333">
                            <b>Departamento:</b> ${p.DEPARTAMEN}<br>
                            <b>Distrito:</b> ${p.DISTRITO}
                        </div>
                    `);
                    markersLayer.addLayer(marker);
                }
            });

            if (data.length > 0 && data.length < 1000) {
                const group = new L.featureGroup(markersLayer.getLayers());
                map.fitBounds(group.getBounds(), { padding: [20, 20] });
            }
        }

        // 5. Actualizar Gráfico (Chart.js)
        function actualizarGrafico(data) {
            const conteo = {};
            data.slice(0, 1000).forEach(p => {
                const key = p.DEPARTAMEN || "Otros";
                conteo[key] = (conteo[key] || 0) + 1;
            });

            const ctx = document.getElementById('chartPie').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(conteo),
                    datasets: [{
                        data: Object.values(conteo),
                        backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#1abc9c', '#f39c12'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 6. Lógica de los Eventos (Filtros)
        document.getElementById('select-departamento').addEventListener('change', function() {
            const depSel = this.value;
            const selectDist = document.getElementById('select-distrito');
            
            selectDist.innerHTML = '<option value="todos">-- Todos --</option>';
            
            let filtrados = puntosOriginales;
            if (depSel !== "todos") {
                filtrados = puntosOriginales.filter(p => p.DEPARTAMEN === depSel);
                const dists = [...new Set(filtrados.map(p => p.DISTRITO))].sort();
                dists.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d;
                    opt.textContent = d;
                    selectDist.appendChild(opt);
                });
            }
            actualizarMapa(filtrados);
            actualizarGrafico(filtrados);
        });

        document.getElementById('select-distrito').addEventListener('change', function() {
            const depSel = document.getElementById('select-departamento').value;
            const distSel = this.value;
            
            let filtrados = puntosOriginales;
            if (depSel !== "todos") filtrados = filtrados.filter(p => p.DEPARTAMEN === depSel);
            if (distSel !== "todos") filtrados = filtrados.filter(p => p.DISTRITO === distSel);
            
            actualizarMapa(filtrados);
            actualizarGrafico(filtrados);
        });

        // INICIO
        cargarDatos();

    </script>
</body>
</html>
