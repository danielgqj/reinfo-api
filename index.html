<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPortal 3D Real - ENAHO 2024</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/jszip@3.7.1/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/@mapbox/togeojson"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        #panel-left { width: 320px; background: rgba(20, 20, 20, 0.9); padding: 15px; border-right: 1px solid #333; z-index: 10; color: white; overflow-y: auto; }
        #map { flex: 1; height: 100%; }
        h2 { color: #00d2ff; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .upload-box { background: #222; padding: 10px; border: 1px dashed #00d2ff; border-radius: 6px; margin-bottom: 15px; }
        #loading { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: #000; color: #00d2ff; padding: 10px 20px; border-radius: 30px; z-index: 2000; border: 1px solid #00d2ff; }
        .hint { font-size: 0.7rem; color: #00d2ff; text-align: center; margin-top: 10px; border: 1px solid #00d2ff; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loading">Cargando Relieve 3D de los Andes...</div>

    <div id="panel-left">
        <h2>Geoportal 3D</h2>
        <div class="upload-box">
            <label style="font-size: 0.7rem; color: #00d2ff; display: block; margin-bottom: 5px;">CARGAR KMZ / KML</label>
            <input type="file" id="upload-file" accept=".kml,.kmz" style="font-size: 0.7rem; width: 100%; color: #888;">
        </div>
        <div id="reporte-analisis" style="display:none; font-size: 0.8rem; background: #1a2a33; padding: 10px; border-radius: 6px;">
            <strong>Resultado:</strong> <div id="resultado-conteo"></div>
        </div>
        <div style="height: 180px; margin-top:20px;"><canvas id="chartBar"></canvas></div>
        <div class="hint">
            <b>INTERACCIÓN 3D:</b><br>
            Mantén <b>Clic Derecho</b> y arrastra hacia arriba para ver las montañas.
        </div>
    </div>

    <div id="map"></div>

    <script>
        // CONFIGURACIÓN TÉCNICA DEL TERRENO 3D
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'google-sat': {
                        type: 'raster',
                        tiles: ['https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}'],
                        tileSize: 256
                    },
                    // FUENTE DE ELEVACIÓN (TERRAIN-RGB)
                    'terrain-data': {
                        type: 'raster-dem',
                        // Usamos la fuente de relieve de MapTiler (Global)
                        tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrararium/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        encoding: 'terrarium' // Formato específico para esta fuente
                    }
                },
                layers: [{ id: 'satelite', type: 'raster', source: 'google-sat' }],
                // ACTIVACIÓN DE LA MALLA 3D
                terrain: {
                    source: 'terrain-data',
                    exaggeration: 2.5 // Esto hará que las montañas se vean MUY altas
                }
            },
            center: [-76.48, -10.68], // Ubicación: Cerro de Pasco (Andes)
            zoom: 11,
            pitch: 75, // Inclinación agresiva para ver el relieve
            bearing: -20,
            maxPitch: 85
        });

        map.addControl(new maplibregl.NavigationControl());

        let dataEnahoFeatures = [];

        map.on('load', () => {
            // Añadir atmósfera para profundidad
            map.setFog({ "range": [0.5, 10], "color": "#111", "high-color": "#000" });
            cargarDatos();
        });

        async function cargarDatos() {
            try {
                const response = await fetch('https://reinfo-api-1.onrender.com/capa-enaho');
                const data = await response.json();
                dataEnahoFeatures = data.features;

                map.addSource('puntos', { type: 'geojson', data: data });
                map.addLayer({
                    id: 'puntos-layer',
                    type: 'circle',
                    source: 'puntos',
                    paint: {
                        'circle-radius': 6,
                        'circle-color': [
                            'step', ['get', 'indice_dep'],
                            '#1a9850', 10, '#fee08b', 40, '#d73027', 70, '#7a0177'
                        ],
                        'circle-stroke-width': 1,
                        'circle-stroke-color': '#000',
                        'circle-pitch-alignment': 'map' // Hace que los puntos sigan la inclinación del cerro
                    }
                });

                actualizarGrafico(data.features);
                document.getElementById('loading').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        function actualizarGrafico(features) {
            const dist = { "Crítico": 0, "Alto": 0, "Medio": 0, "Bajo": 0 };
            features.forEach(f => {
                const v = f.properties.indice_dep;
                if (v > 70) dist["Crítico"]++; else if (v > 40) dist["Alto"]++; else if (v > 10) dist["Medio"]++; else dist["Bajo"]++;
            });
            new Chart(document.getElementById('chartBar'), {
                type: 'bar',
                data: {
                    labels: Object.keys(dist),
                    datasets: [{ data: Object.values(dist), backgroundColor: ['#7a0177', '#d73027', '#fee08b', '#1a9850'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // --- Lógica KMZ ---
        document.getElementById('upload-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            const esKMZ = file.name.endsWith('.kmz');

            reader.onload = async (event) => {
                let kml;
                if (esKMZ) {
                    const zip = await JSZip.loadAsync(event.target.result);
                    const kmlFile = Object.keys(zip.files).find(f => f.endsWith('.kml'));
                    kml = await zip.file(kmlFile).async("string");
                } else { kml = event.target.result; }

                const geojson = toGeoJSON.kml(new DOMParser().parseFromString(kml, "text/xml"));
                
                if (map.getSource('user-area')) { map.getSource('user-area').setData(geojson); } 
                else {
                    map.addSource('user-area', { type: 'geojson', data: geojson });
                    map.addLayer({
                        id: 'user-fill', type: 'fill', source: 'user-area',
                        paint: { 'fill-color': '#00d2ff', 'fill-opacity': 0.4 }
                    });
                }

                const bbox = turf.bbox(geojson);
                map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]], { padding: 50, pitch: 60 });
            };
            if (esKMZ) reader.readAsArrayBuffer(file); else reader.readAsText(file);
        });
    </script>
</body>
</html>
