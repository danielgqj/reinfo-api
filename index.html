<script>
    // 1. Configuración del Mapa con Google Hybrid
    const map = L.map('map').setView([-9.189967, -75.015152], 6);

    const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        subdomains:['mt0','mt1','mt2','mt3'],
        attribution: 'Google Maps'
    }).addTo(map);

    let puntosOriginales = [];
    let markersLayer = L.layerGroup().addTo(map);
    let myChart;

    // 2. Carga de datos desde Render
    async function cargarDatos() {
        try {
            const response = await fetch('https://reinfo-api-1.onrender.com/puntos-reinfo');
            puntosOriginales = await response.json();
            
            console.log("Datos cargados:", puntosOriginales[0]); // Para verificar en consola

            rellenarFiltroDepartamentos(puntosOriginales);
            actualizarMapa(puntosOriginales);
            actualizarGrafico(puntosOriginales);
        } catch (error) {
            console.error("Error al cargar datos:", error);
        }
    }

    // 3. Llenar Select de Departamentos
    function rellenarFiltroDepartamentos(data) {
        const selectDep = document.getElementById('select-departamento');
        const deps = [...new Set(data.map(p => p.DEPARTAMEN))].sort();
        
        deps.forEach(dep => {
            if (dep) {
                const opt = document.createElement('option');
                opt.value = dep;
                opt.textContent = dep;
                selectDep.appendChild(opt);
            }
        });
    }

    // 4. Actualizar Marcadores
    function actualizarMapa(data) {
        markersLayer.clearLayers();
        data.forEach(p => {
            // Usamos lat y lon que genera GeoPandas por defecto, y tus columnas de texto
            if (p.lat && p.lon) {
                const marker = L.circleMarker([p.lat, p.lon], {
                    radius: 5,
                    fillColor: "#00f2ff",
                    color: "#fff",
                    weight: 1,
                    fillOpacity: 0.8
                });
                marker.bindPopup(`
                    <b>Departamento:</b> ${p.DEPARTAMEN}<br>
                    <b>Distrito:</b> ${p.DISTRITO}
                `);
                markersLayer.addLayer(marker);
            }
        });

        // Ajustar vista si hay pocos puntos (opcional)
        if (data.length > 0 && data.length < 500) {
            const group = new L.featureGroup(markersLayer.getLayers());
            map.fitBounds(group.getBounds());
        }
    }

    // 5. Gráfico Estadístico
    function actualizarGrafico(data) {
        const conteo = {};
        data.forEach(p => {
            const key = p.DEPARTAMEN || "Otros";
            conteo[key] = (conteo[key] || 0) + 1;
        });

        const ctx = document.getElementById('chartPie').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(conteo),
                datasets: [{
                    data: Object.values(conteo),
                    backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    // 6. Eventos de los Filtros
    document.getElementById('select-departamento').addEventListener('change', function() {
        const depSel = this.value;
        const selectDist = document.getElementById('select-distrito');
        
        // Limpiar distritos
        selectDist.innerHTML = '<option value="todos">Todos los Distritos</option>';
        
        let filtrados = puntosOriginales;
        if (depSel !== "todos") {
            filtrados = puntosOriginales.filter(p => p.DEPARTAMEN === depSel);
            
            // Cargar distritos del departamento elegido
            const dists = [...new Set(filtrados.map(p => p.DISTRITO))].sort();
            dists.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d;
                selectDist.appendChild(opt);
            });
        }
        
        actualizarMapa(filtrados);
        actualizarGrafico(filtrados);
    });

    document.getElementById('select-distrito').addEventListener('change', function() {
        const depSel = document.getElementById('select-departamento').value;
        const distSel = this.value;
        
        let filtrados = puntosOriginales;
        if (depSel !== "todos") filtrados = filtrados.filter(p => p.DEPARTAMEN === depSel);
        if (distSel !== "todos") filtrados = filtrados.filter(p => p.DISTRITO === distSel);
        
        actualizarMapa(filtrados);
        actualizarGrafico(filtrados);
    });

    cargarDatos();
</script>

        cargarDatos();
    </script>
</body>
</html>
