<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Anomalías REINFO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #0f0f0f; color: white; }
        #map { flex: 1; height: 100%; }
        #panel { width: 350px; background: #181818; padding: 20px; box-sizing: border-box; overflow-y: auto; border-right: 1px solid #333; }
        h2 { color: #00d2ff; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .filter-group { margin-bottom: 15px; }
        select { width: 100%; padding: 10px; background: #252525; color: white; border: 1px solid #444; border-radius: 5px; }
        .legend { background: #222; padding: 10px; border-radius: 8px; margin-top: 20px; font-size: 0.8rem; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .color-box { width: 15px; height: 15px; margin-right: 10px; border-radius: 3px; }
        #loading { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; z-index: 2000; display: none; border: 1px solid #00d2ff; }
    </style>
</head>
<body>

    <div id="panel">
        <h2>Dashboard SEM</h2>
        
        <div class="filter-group">
            <label>Departamento</label>
            <select id="select-departamento">
                <option value="todos">-- Todos --</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Distrito</label>
            <select id="select-distrito">
                <option value="todos">-- Todos --</option>
            </select>
        </div>

        <div class="legend">
            <strong>Interpretación de Residuos:</strong>
            <div class="legend-item"><div class="color-box" style="background: #d73027;"></div> Brecha: Riqueza < Esperada</div>
            <div class="legend-item"><div class="color-box" style="background: #f7f7f7;"></div> Equilibrio</div>
            <div class="legend-item"><div class="color-box" style="background: #4575b4;"></div> Superávit: Riqueza > Esperada</div>
        </div>

        <canvas id="chartPie" style="margin-top: 30px;"></canvas>
    </div>

    <div id="loading">Cargando datos espaciales...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-9.19, -75.01], 6);
        
        // Capa Satelital Híbrida
        L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3'],
            attribution: '© Google Maps'
        }).addTo(map);

        let puntosOriginales = [];
        let markersLayer = L.layerGroup().addTo(map);
        let myChart;

        // Función para asignar color según el valor de los residuos (Escala RdBu)
        function getColor(res) {
            return res < -1.5 ? '#d73027' : // Rojo fuerte
                   res < -0.5 ? '#fc8d59' : // Naranja
                   res < 0.5  ? '#f7f7f7' : // Blanco
                   res < 1.5  ? '#91bfdb' : // Celeste
                                '#4575b4';   // Azul fuerte
        }

        async function cargarDatos() {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch('https://reinfo-api-1.onrender.com/puntos-reinfo');
                puntosOriginales = await response.json();
                
                rellenarFiltros();
                actualizarMapa(puntosOriginales);
                actualizarGrafico(puntosOriginales);
                
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                console.error(e);
                alert("Error al conectar con la API de Render.");
            }
        }

        function rellenarFiltros() {
            const selectDep = document.getElementById('select-departamento');
            const deps = [...new Set(puntosOriginales.map(p => p.DEPARTAMEN))].sort();
            deps.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d; opt.textContent = d;
                selectDep.appendChild(opt);
            });
        }

        function actualizarMapa(data) {
            markersLayer.clearLayers();
            data.forEach(p => {
                if (p.lat && p.lon) {
                    const marker = L.circleMarker([p.lat, p.lon], {
                        radius: 6,
                        fillColor: getColor(p.residuos), // Color dinámico
                        color: "#000",
                        weight: 1,
                        fillOpacity: 0.9
                    });
                    
                    marker.bindPopup(`
                        <div style="color:#333">
                            <b>${p.DISTRITO}</b> (${p.DEPARTAMEN})<br>
                            <hr>
                            <b>Residuo SEM:</b> ${p.residuos ? p.residuos.toFixed(4) : 'N/A'}<br>
                            <small>${p.residuos < 0 ? '⚠️ Alerta de Brecha' : '✅ Zona en Bienestar'}</small>
                        </div>
                    `);
                    markersLayer.addLayer(marker);
                }
            });
            if (data.length > 0 && data.length < 500) map.fitBounds(new L.featureGroup(markersLayer.getLayers()).getBounds());
        }

        function actualizarGrafico(data) {
            const conteo = { "Brecha (Rojo)": 0, "Equilibrio": 0, "Superávit (Azul)": 0 };
            data.forEach(p => {
                if (p.residuos < -0.5) conteo["Brecha (Rojo)"]++;
                else if (p.residuos > 0.5) conteo["Superávit (Azul)"]++;
                else conteo["Equilibrio"]++;
            });

            const ctx = document.getElementById('chartPie').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(conteo),
                    datasets: [{
                        data: Object.values(conteo),
                        backgroundColor: ['#d73027', '#f7f7f7', '#4575b4']
                    }]
                },
                options: { plugins: { legend: { labels: { color: 'white' } } } }
            });
        }

        // Eventos de Filtro
        document.getElementById('select-departamento').addEventListener('change', function() {
            const depSel = this.value;
            const selectDist = document.getElementById('select-distrito');
            selectDist.innerHTML = '<option value="todos">-- Todos --</option>';
            
            let filtrados = puntosOriginales;
            if (depSel !== "todos") {
                filtrados = puntosOriginales.filter(p => p.DEPARTAMEN === depSel);
                const dists = [...new Set(filtrados.map(p => p.DISTRITO))].sort();
                dists.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d; opt.textContent = d;
                    selectDist.appendChild(opt);
                });
            }
            actualizarMapa(filtrados);
            actualizarGrafico(filtrados);
        });

        document.getElementById('select-distrito').addEventListener('change', function() {
            const depSel = document.getElementById('select-departamento').value;
            const distSel = this.value;
            let filtrados = puntosOriginales;
            if (depSel !== "todos") filtrados = filtrados.filter(p => p.DEPARTAMEN === depSel);
            if (distSel !== "todos") filtrados = filtrados.filter(p => p.DISTRITO === distSel);
            actualizarMapa(filtrados);
            actualizarGrafico(filtrados);
        });

        cargarDatos();
    </script>
</body>
</html>
